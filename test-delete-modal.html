<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="csrf-token" content="test-token">
    <title>Test Delete Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">Delete Modal Test</h1>

    <div class="bg-white p-6 rounded-lg shadow-md max-w-md">
        <h2 class="text-lg font-semibold mb-4">Test Delete Button</h2>
        <p class="text-gray-600 mb-4">Click the delete button below. The modal should appear.</p>

        <!-- Test Delete Button -->
        <button type="button"
                class="p-2 text-gray-400 hover:text-red-600 rounded-lg hover:bg-red-50 transition-colors duration-150"
                data-url="/test-delete"
                data-item-name="Test Item"
                data-modal-confirm="Are you sure you want to delete this test item?">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 01 16.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
            Delete Test Item
        </button>

        <div id="test-output" class="mt-6 p-4 bg-gray-100 rounded text-sm"></div>
    </div>

    <!-- Test Modal (simplified version) -->
    <div id="delete-modal" class="fixed inset-0 z-50 hidden" role="dialog">
        <div class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity duration-300"></div>
        <div class="fixed inset-0 z-10 overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4">
                <div class="relative bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full transform transition-all">
                    <h3 id="delete-modal-title" class="text-xl font-bold text-gray-900 mb-4"></h3>
                    <p id="delete-modal-description" class="text-gray-600 mb-6"></p>
                    <div class="flex justify-end gap-3">
                        <button data-modal-cancel class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">Cancel</button>
                        <button data-modal-confirm class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Log for debugging
        document.getElementById('test-output').innerHTML = '<p class="text-green-600 mb-2">✅ Page loaded</p><p>Open browser console (F12) to see debug messages</p>';

        // Test if modal exists
        const modal = document.getElementById('delete-modal');
        if (modal) {
            document.getElementById('test-output').innerHTML += '<p class="text-green-600">✅ Modal element found</p>';
        } else {
            document.getElementById('test-output').innerHTML += '<p class="text-red-600">❌ Modal element NOT found</p>';
        }

        // Test delete button
        const deleteButton = document.querySelector('[data-modal-confirm]');
        if (deleteButton) {
            document.getElementById('test-output').innerHTML += '<p class="text-green-600">✅ Delete button found</p>';

            deleteButton.addEventListener('click', function(e) {
                e.preventDefault();
                console.log('🔴 Delete button clicked!');
                console.log('Modal:', modal);
                console.log('Modal class:', modal.className);

                // Show modal
                modal.classList.remove('hidden');
                modal.querySelector('#delete-modal-title').textContent = 'Confirm Delete';
                modal.querySelector('#delete-modal-description').textContent = 'Are you sure you want to delete this test item?';

                console.log('✅ Modal should now be visible');
                document.getElementById('test-output').innerHTML += '<p class="text-blue-600">✅ Delete clicked - modal should be visible</p>';
            });
        } else {
            document.getElementById('test-output').innerHTML += '<p class="text-red-600">❌ Delete button NOT found</p>';
        }

        // Cancel button closes modal
        document.querySelectorAll('[data-modal-cancel]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                modal.classList.add('hidden');
                console.log('❌ Modal closed');
            });
        });

        // Confirm button
        document.querySelectorAll('[data-modal-confirm]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                console.log('✅ Delete confirmed!');
                alert('Delete confirmed! (This is a test)');
                modal.classList.add('hidden');
            });
        });

        // Close on backdrop click
        document.querySelector('.backdrop-blur-sm').addEventListener('click', function() {
            modal.classList.add('hidden');
            console.log('❌ Modal closed (backdrop)');
        });

        // Close on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                modal.classList.add('hidden');
                console.log('❌ Modal closed (Escape)');
            }
        });
    </script>
</body>
</html>
